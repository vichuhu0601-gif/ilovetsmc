<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>估值計算機 (2026 - 2030)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --primary-accent: #2563eb;
            
            /* 紅框與黑框顏色優化 */
            --input-red: #f43f5e;       
            --input-red-bg: #fff5f5;
            --output-black: #1e293b;    
            --output-black-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.03);
            max-width: 1100px;
            width: 100%;
        }

        /* 頂部標題與按鈕 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 20px;
        }

        h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .print-btn {
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .print-btn:hover {
            background-color: #334155;
            transform: translateY(-1px);
        }

        /* EPS 時間軸區塊 */
        .eps-flow-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            background-color: #ffffff;
            padding: 24px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            margin-bottom: 35px;
            gap: 6px;
            overflow-x: auto;
        }

        .year-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .year-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .growth-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            min-width: 60px;
        }

        .arrow-text {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .arrow-line {
            width: 100%;
            height: 1px;
            background-color: #cbd5e1;
            position: relative;
            margin-bottom: 4px;
        }
        .arrow-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            border-width: 4px 0 4px 5px;
            border-style: solid;
            border-color: transparent transparent transparent #cbd5e1;
        }

        .input-red-core {
            border: 2px solid var(--input-red);
            background-color: var(--input-red-bg);
            color: var(--text-main);
            border-radius: 8px;
            padding: 8px;
            width: 75px;
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: all 0.15s ease;
        }
        .input-red-core:focus {
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.15);
        }

        .input-red-growth {
            border: 1.5px solid var(--input-red);
            background-color: var(--input-red-bg);
            color: var(--text-main);
            border-radius: 6px;
            padding: 4px;
            width: 42px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
        }

        .output-black {
            border: 2px solid var(--output-black);
            background-color: var(--output-black-bg);
            color: var(--output-black);
            border-radius: 8px;
            padding: 8px;
            width: 75px;
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
        }

        .growth-input-wrapper {
            display: flex;
            align-items: center;
            gap: 1px;
        }

        /* 下方表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #ffffff;
        }

        th, td {
            padding: 16px 12px;
            text-align: center;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            background-color: #fafafa;
            color: var(--text-main);
            font-weight: 600;
            border-top: 1px solid var(--border-light);
        }

        .table-eps-sub {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }

        .table-diagonal {
            background: linear-gradient(to top right, #fafafa 49.5%, #e2e8f0 49.5%, #e2e8f0 50.5%, #fafafa 50.5%);
            position: relative;
        }

        .diagonal-bottom {
            position: absolute;
            bottom: 6px;
            left: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .diagonal-top {
            position: absolute;
            top: 6px;
            right: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .pe-row-head {
            font-weight: 700;
            color: var(--text-main);
            background-color: #fafafa;
        }

        .calculated-price {
            font-weight: 600;
            color: var(--primary-accent);
        }

        /* 圖表區塊 */
        .chart-container {
            margin-top: 40px;
            position: relative;
            height: 380px;
            width: 100%;
            border-top: 1px solid var(--border-light);
            padding-top: 30px;
        }

        /* 列印與 PDF 設定 */
        @media print {
            body { background-color: #ffffff; padding: 0; margin: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; width: 100%; }
            .print-btn { display: none !important; }
            .header-area { margin-bottom: 20px; justify-content: center; }
            .eps-flow-container { margin-bottom: 20px; padding: 12px 6px; border: 1px solid #cbd5e1; }
            th, td { padding: 10px 6px; font-size: 0.85rem; }
            .chart-container { margin-top: 20px; height: 320px !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 15mm 10mm; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>估值計算機 (2026 - 2030)</h2>
        <button class="print-btn" onclick="window.print()">
            🖨️ 匯出 PDF 報告
        </button>
    </div>
    
    <div class="eps-flow-container">
        <div class="year-group">
            <span class="year-label">2026</span>
            <input type="number" id="eps2026" class="input-red-core" placeholder="0" step="any">
        </div>

        <div class="growth-arrow">
            <span class="arrow-text">成長</span>
            <div class="growth-input-wrapper">
                <input type="number" id="growth2027" class="input-red-growth" placeholder="0" step="any">
                <span style="color: var(--input-red); font-size: 0.8rem; font-weight: bold;">%</span>
            </div>
            <div class="arrow-line"></div>
        </div>

        <div class="year-group">
            <span class="year-label">2027</span>
            <input type="text" id="eps2027" class="output-black" value="-" readonly>
        </div>

        <div class="growth-arrow">
            <span class="arrow-text">成長</span>
            <div class="growth-input-wrapper">
                <input type="number" id="growth2028" class="input-red-growth" placeholder="0" step="any">
                <span style="color: var(--input-red); font-size: 0.8rem; font-weight: bold;">%</span>
            </div>
            <div class="arrow-line"></div>
        </div>

        <div class="year-group">
            <span class="year-label">2028</span>
            <input type="text" id="eps2028" class="output-black" value="-" readonly>
        </div>

        <div class="growth-arrow">
            <span class="arrow-text">成長</span>
            <div class="growth-input-wrapper">
                <input type="number" id="growth2029" class="input-red-growth" placeholder="0" step="any">
                <span style="color: var(--input-red); font-size: 0.8rem; font-weight: bold;">%</span>
            </div>
            <div class="arrow-line"></div>
        </div>

        <div class="year-group">
            <span class="year-label">2029</span>
            <input type="text" id="eps2029" class="output-black" value="-" readonly>
        </div>

        <div class="growth-arrow">
            <span class="arrow-text">成長</span>
            <div class="growth-input-wrapper">
                <input type="number" id="growth2030" class="input-red-growth" placeholder="0" step="any">
                <span style="color: var(--input-red); font-size: 0.8rem; font-weight: bold;">%</span>
            </div>
            <div class="arrow-line"></div>
        </div>

        <div class="year-group">
            <span class="year-label">2030</span>
            <input type="text" id="eps2030" class="output-black" value="-" readonly>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="table-diagonal" style="width: 140px; height: 52px;">
                    <div class="diagonal-bottom">本益比</div>
                    <div class="diagonal-top">年度</div>
                </th>
                <th>2026<span id="sub-eps-2026" class="table-eps-sub">EPS: -</span></th>
                <th>2027<span id="sub-eps-2027" class="table-eps-sub">EPS: -</span></th>
                <th>2028<span id="sub-eps-2028" class="table-eps-sub">EPS: -</span></th>
                <th>2029<span id="sub-eps-2029" class="table-eps-sub">EPS: -</span></th>
                <th>2030<span id="sub-eps-2030" class="table-eps-sub">EPS: -</span></th>
            </tr>
        </thead>
        <tbody>
            <tr data-pe="20">
                <td class="pe-row-head">20 x</td>
                <td id="p-2026-20" class="calculated-price">-</td>
                <td id="p-2027-20" class="calculated-price">-</td>
                <td id="p-2028-20" class="calculated-price">-</td>
                <td id="p-2029-20" class="calculated-price">-</td>
                <td id="p-2030-20" class="calculated-price">-</td>
            </tr>
            <tr data-pe="23">
                <td class="pe-row-head">23 x</td>
                <td id="p-2026-23" class="calculated-price">-</td>
                <td id="p-2027-23" class="calculated-price">-</td>
                <td id="p-2028-23" class="calculated-price">-</td>
                <td id="p-2029-23" class="calculated-price">-</td>
                <td id="p-2030-23" class="calculated-price">-</td>
            </tr>
            <tr data-pe="25">
                <td class="pe-row-head">25 x</td>
                <td id="p-2026-25" class="calculated-price">-</td>
                <td id="p-2027-25" class="calculated-price">-</td>
                <td id="p-2028-25" class="calculated-price">-</td>
                <td id="p-2029-25" class="calculated-price">-</td>
                <td id="p-2030-25" class="calculated-price">-</td>
            </tr>
            <tr data-pe="28">
                <td class="pe-row-head">28 x</td>
                <td id="p-2026-28" class="calculated-price">-</td>
                <td id="p-2027-28" class="calculated-price">-</td>
                <td id="p-2028-28" class="calculated-price">-</td>
                <td id="p-2029-28" class="calculated-price">-</td>
                <td id="p-2030-28" class="calculated-price">-</td>
            </tr>
        </tbody>
    </table>

    <div class="chart-container">
        <canvas id="valuationChart"></canvas>
    </div>
</div>

<script>
    const eps2026Input = document.getElementById('eps2026');
    const growth2027Input = document.getElementById('growth2027');
    const growth2028Input = document.getElementById('growth2028');
    const growth2029Input = document.getElementById('growth2029');
    const growth2030Input = document.getElementById('growth2030');

    const eps2027Output = document.getElementById('eps2027');
    const eps2028Output = document.getElementById('eps2028');
    const eps2029Output = document.getElementById('eps2029');
    const eps2030Output = document.getElementById('eps2030');

    const peRows = [20, 23, 25, 28];
    const years = [2026, 2027, 2028, 2029, 2030];
    let valuationChart;

    // 格式化功能：四捨五入取整數並包含千分位
    function formatEps(num) {
        if (isNaN(num) || num === null) return '-';
        return Math.round(num).toLocaleString();
    }

    function initChart() {
        const ctx = document.getElementById('valuationChart').getContext('2d');
        
        // 優化配色：20倍用綠色，越高越趨近紅色，28倍完全為紅色
        const colors = ['#22c55e', '#eab308', '#f97316', '#ef4444']; 
        
        valuationChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: years.map(String),
                datasets: peRows.map((pe, idx) => ({
                    label: `${pe} x 本益比情境`,
                    data: [null, null, null, null, null],
                    borderColor: colors[idx],
                    backgroundColor: colors[idx] + '10', // 輕量透明填充
                    borderWidth: 3,
                    pointBackgroundColor: colors[idx],
                    pointRadius: 4,
                    tension: 0.15,
                    fill: true
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: { 
                        display: true, 
                        text: '未來五年度預估股價趨勢投影', 
                        font: { size: 14, weight: '700', family: 'Inter' },
                        padding: { bottom: 10 },
                        color: '#1e293b'
                    },
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { size: 12, family: 'Inter' }, color: '#64748b' }
                    },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { family: 'Inter' } } },
                    y: { grid: { color: '#f1f5f9' }, ticks: { color: '#64748b', font: { family: 'Inter' } } }
                }
            }
        });
    }

    function saveToLocalStorage() {
        localStorage.setItem('eps2026', eps2026Input.value);
        localStorage.setItem('growth2027', growth2027Input.value);
        localStorage.setItem('growth2028', growth2028Input.value);
        localStorage.setItem('growth2029', growth2029Input.value);
        localStorage.setItem('growth2030', growth2030Input.value);
    }

    function loadFromLocalStorage() {
        if (localStorage.getItem('eps2026') !== null) eps2026Input.value = localStorage.getItem('eps2026');
        if (localStorage.getItem('growth2027') !== null) growth2027Input.value = localStorage.getItem('growth2027');
        if (localStorage.getItem('growth2028') !== null) growth2028Input.value = localStorage.getItem('growth2028');
        if (localStorage.getItem('growth2029') !== null) growth2029Input.value = localStorage.getItem('growth2029');
        if (localStorage.getItem('growth2030') !== null) growth2030Input.value = localStorage.getItem('growth2030');
    }

    function calculate() {
        const eps2026 = parseFloat(eps2026Input.value);
        
        if (isNaN(eps2026)) {
            eps2027Output.value = '-';
            eps2028Output.value = '-';
            eps2029Output.value = '-';
            eps2030Output.value = '-';
            clearAll();
            return;
        }

        const g2027 = parseFloat(growth2027Input.value) || 0;
        const g2028 = parseFloat(growth2028Input.value) || 0;
        const g2029 = parseFloat(growth2029Input.value) || 0;
        const g2030 = parseFloat(growth2030Input.value) || 0;

        // 計算精準複利 EPS
        const eps2027 = eps2026 * (1 + g2027 / 100);
        const eps2028 = eps2027 * (1 + g2028 / 100);
        const eps2029 = eps2028 * (1 + g2029 / 100);
        const eps2030 = eps2029 * (1 + g2030 / 100);

        // 顯示四捨五入整數
        eps2027Output.value = formatEps(eps2027);
        eps2028Output.value = formatEps(eps2028);
        eps2029Output.value = formatEps(eps2029);
        eps2030Output.value = formatEps(eps2030);

        const dataMap = {
            2026: eps2026,
            2027: eps2027,
            2028: eps2028,
            2029: eps2029,
            2030: eps2030
        };

        // 更新表格表頭副標題
        years.forEach(year => {
            document.getElementById(`sub-eps-${year}`).innerText = `EPS: ${formatEps(dataMap[year])}`;
        });

        // 以四捨五入後的整數 EPS 推導股價矩陣
        peRows.forEach((pe, peIdx) => {
            const rowDataForChart = [];
            years.forEach(year => {
                const targetTd = document.getElementById(`p-${year}-${pe}`);
                const roundedEps = Math.round(dataMap[year]);
                const price = roundedEps * pe;
                
                if (targetTd) {
                    targetTd.innerText = price.toLocaleString();
                }
                rowDataForChart.push(price);
            });
            valuationChart.data.datasets[peIdx].data = rowDataForChart;
        });

        valuationChart.update();
    }

    function clearAll() {
        years.forEach(year => {
            document.getElementById(`sub-eps-${year}`).innerText = 'EPS: -';
            peRows.forEach(pe => {
                const targetTd = document.getElementById(`p-${year}-${pe}`);
                if (targetTd) targetTd.innerText = '-';
            });
        });

        peRows.forEach((_, peIdx) => {
            valuationChart.data.datasets[peIdx].data = [null, null, null, null, null];
        });
        valuationChart.update();
    }

    [eps2026Input, growth2027Input, growth2028Input, growth2029Input, growth2030Input].forEach(input => {
        input.addEventListener('input', () => {
            calculate();
            saveToLocalStorage();
        });
    });

    window.onload = () => {
        initChart();
        loadFromLocalStorage();
        calculate();
    };
</script>

</body>
</html>
